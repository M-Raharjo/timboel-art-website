media:
  input: content/articles
  output: /articles
  rename: safe
  extensions:
    - jpg
    - jpeg
    - png
    - webp
    - gif

content:
  - name: articles
    label: Articles
    type: collection
    path: content/articles
    format: yaml-frontmatter
    subfolders: true

    filename:
      template: "{fields.slug}/index.md"
      field: create

    view:
      primary: slug
      fields:
        - slug
        - date
        - main_image
      sort: date
      order: desc

    fields:
      - name: slug
        label: Title Slug
        type: string
        required: true
        pattern:
          regex: "^[a-z0-9-]+$"
          message: "Use lowercase letters, numbers, and hyphens only."

      - name: date
        label: Date
        type: date
        required: true

      - name: main_image
        label: Hero Image
        type: image
        required: false
        options:
          rename: safe
          extensions:
            - jpg
            - jpeg
            - png
            - webp

      - name: mentioned_product
        label: Mentioned Product
        type: string
        list: true
        required: false

      - name: body
        label: Body
        type: rich-text
        required: false
        options:
          format: markdown
          rename: safe