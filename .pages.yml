media:
  input: content/articles
  output: /articles
  rename: safe
  extensions:
    - jpg
    - jpeg
    - png
    - webp
    - gif

content:
  - name: articles
    label: Articles
    type: collection
    path: content/articles
    format: yaml-frontmatter
    filename:
      template: "{slug}/index.md"
      field: slug
    subfolders: true

    view:
      primary: title
      fields:
        - title
        - date
        - main_image

      sort: date
      order: desc

    fields:
      - name: title
        label: Title
        type: string
        required: true

      - name: slug
        label: Slug
        type: string
        required: true

      - name: date
        label: Date
        type: date
        required: true

      - name: main_image
        label: Hero Image
        type: image
        required: false
        options:
          rename: safe
          extensions:
            - jpg
            - jpeg
            - png
            - webp

      - name: mentioned_product
        label: Mentioned Product
        type: string
        list: true
        required: false

      - name: body
        label: Body
        type: rich-text
        required: false
        options:
          format: markdown
          rename: safe